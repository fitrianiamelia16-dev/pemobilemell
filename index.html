<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FAD0B9" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192x192-A.png" type="image/png" />
  <title>Moia - Magic Makeup Assistant 🪄</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --moia-cream: #FFF5ED;
      --moia-pink-soft: #FAD0B9;
      --moia-gold: #A3834B;
      --text-main: #4A4A4A;
      --glass: rgba(255, 255, 255, 0.7);
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #fcece3;
      display: flex;
      justify-content: center;
    }

    .app-shell {
      width: 100%;
      max-width: 500px;
      background: linear-gradient(to bottom, #fdfcfb 0%, #e2d1c3 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 40px rgba(0,0,0,0.1);
    }

    /* --- OPENING SPLASH --- */
    #splash-screen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--moia-cream);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      color: var(--moia-gold);
      margin: 0;
      letter-spacing: -1px;
    }

    .magic-icon { font-size: 2rem; animation: rotate 2s infinite linear; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* --- CONTENT --- */
    .header { padding: 40px 20px 20px; text-align: center; }
    .header h1 { font-family: 'Playfair Display', serif; color: var(--moia-gold); font-size: 2.8rem; margin: 0; }

    .main { padding: 20px; flex: 1; }

    .card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 30px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.5);
      margin-bottom: 25px;
      text-align: center;
    }

    .camera-box {
      width: 100%;
      height: 300px;
      background: #000;
      border-radius: 25px;
      position: relative;
      overflow: hidden;
      margin: 15px 0;
    }

    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }

    /* --- STEP BY STEP TEXT ONLY --- */
    .step-text-only {
      background: white;
      border-radius: 20px;
      margin: 10px 0;
      padding: 18px;
      text-align: left;
      border-left: 5px solid var(--moia-pink-soft);
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }

    .step-text-only b { color: var(--moia-gold); font-size: 1rem; display: block; margin-bottom: 5px; }
    .step-text-only p { font-size: 0.85rem; margin: 0; line-height: 1.5; color: var(--text-main); }

    .shade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
    .shade-item {
      padding: 10px; background: rgba(255,255,255,0.9);
      border-radius: 15px; display: flex; align-items: center; font-size: 0.75rem;
    }
    .color-dot { width: 22px; height: 22px; border-radius: 50%; margin-right: 10px; border: 1px solid #ddd; }

    button {
      background: linear-gradient(135deg, #F8B195, #F67280);
      color: white; border: none; padding: 16px; border-radius: 50px;
      font-weight: 600; width: 100%; margin: 10px 0; cursor: pointer;
    }

    .btn-secondary { background: white; color: var(--moia-gold); border: 1px solid var(--moia-gold); }
    .footer { text-align: center; padding: 20px; font-size: 0.8rem; color: var(--moia-gold); }
  </style>
</head>

<body>

  <div id="splash-screen">
    <div class="magic-icon">✨</div>
    <h1 class="brand-logo">Moia</h1>
    <p style="letter-spacing: 3px; font-size: 0.7rem; color: #A3834B;">BEAUTY MAGIC 🪄</p>
  </div>

  <div class="app-shell">
    <header class="header">
      <h1>Moia</h1>
      <p>Your Personal Beauty Wizard ✨</p>
    </header>

    <main class="main">
      <section class="card" id="cam-section">
        <h3>Analisis Wajah 📸</h3>
        <div class="camera-box">
          <video id="video" autoplay playsinline></video>
          <div id="status" style="color: white; margin-top: 130px;">Kamera Siap...</div>
        </div>
        <button onclick="startCamera()" id="btnStart">Buka Kamera 🎥</button>
        <button onclick="analyzeFace()" class="btn-secondary" id="btnAnalyze" disabled>Analisis Sekarang ✨</button>
      </section>

      <section id="results" class="card" style="display: none;">
        <h2 id="look-type" style="color: var(--moia-gold);">Korean Look 🌸</h2>
        <div id="analysis-reason" style="font-size: 0.85rem; padding: 15px; background: #fff; border-radius: 20px; margin-bottom: 20px; text-align: left;">
        </div>

        <h4 align="left">Rekomendasi Shade 🎨</h4>
        <div class="shade-grid" id="shades"></div>

        <h4 align="left">Tutorial Langkah-Demi-Langkah 📖</h4>
        <div id="tutorial-list"></div>
      </section>

      <button onclick="alert('tombol testing hidup')" class="btn-secondary">Ini tombol 1 😊</button>
    </main>

    <footer class="footer">
      <p>© 2026 Moia - Anwar Fauzi 🪄</p>
    </footer>
  </div>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 2500);
    });

    let video = document.getElementById('video');
    let isCamOn = false;

    async function startCamera() {
      if(!isCamOn) {
        try {
          let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
          video.srcObject = stream;
          video.style.display = 'block';
          document.getElementById('status').style.display = 'none';
          document.getElementById('btnAnalyze').disabled = false;
          isCamOn = true;
          btnStart.innerText = "Tutup Kamera ❌";
        } catch (e) { alert("Izin kamera ditolak"); }
      } else {
        video.srcObject.getTracks().forEach(t => t.stop());
        video.style.display = 'none';
        document.getElementById('status').style.display = 'block';
        btnStart.innerText = "Buka Kamera 🎥";
        isCamOn = false;
      }
    }

    function analyzeFace() {
      document.getElementById('btnAnalyze').innerText = "Sedang Memproses... ✨";
      setTimeout(() => {
        document.getElementById('results').style.display = 'block';
        
        const makeupData = {
          title: "Soft Korean Look 🌸",
          reason: "Analisis menunjukkan fitur wajahmu yang **Lembut**. Tipe ini dipilih untuk memberikan kesan wajah yang lebih segar, bercahaya, dan natural sesuai dengan karakter wajahmu. 😊",
          shades: [
            { l: "Under Eye", n: "Peach Light", c: "#f7ccac" },
            { l: "Contour", n: "Soft Taupe", c: "#b29e8d" },
            { l: "Alis", n: "Ash Brown", c: "#5d4c44" },
            { l: "Blush", n: "Soft Peach", c: "#ffb3a7" },
            { l: "Lipstick", n: "Berry Tint", c: "#e25e6b" },
            { l: "Eyeshadow", n: "Champagne", c: "#e7d1b6" }
          ],
          steps: [
            { t: "1. Area Under Eye 👁️", d: "Aplikasikan concealer tipis-tipis pada area bawah mata. Tap lembut menggunakan jari manis agar produk menyatu sempurna dengan kulit." },
            { t: "2. Definisi Contour 📐", d: "Gunakan contour pada area rahang dan sedikit di bawah tulang pipi. Baurkan dengan gerakan memutar ke arah atas untuk efek wajah lebih tirus." },
            { t: "3. Gambar Alis Natural ✏️", d: "Isi bagian alis yang kosong mengikuti arah tumbuh rambut. Hindari menekan terlalu keras agar hasilnya tetap natural dan tidak kaku." },
            { t: "4. Sentuhan Blush On 😊", d: "Gunakan blush on tepat di puncak pipi (apple cheeks) saat kamu tersenyum. Tarik sedikit ke arah telinga agar terlihat lebih segar." },
            { t: "5. Gradient Lips 💄", d: "Gunakan liptint di bagian dalam bibir, lalu baurkan ke arah luar menggunakan jari untuk menciptakan efek gradasi khas Korean Look." }
          ]
        };

        document.getElementById('look-type').innerText = makeupData.title;
        document.getElementById('analysis-reason').innerHTML = makeupData.reason;
        
        let shadeHtml = "";
        makeupData.shades.forEach(s => {
          shadeHtml += `<div class="shade-item"><div class="color-dot" style="background:${s.c}"></div><div><b>${s.l}</b><br>${s.n}</div></div>`;
        });
        document.getElementById('shades').innerHTML = shadeHtml;

        let stepHtml = "";
        makeupData.steps.forEach(st => {
          stepHtml += `<div class="step-text-only"><b>${st.t}</b><p>${st.d}</p></div>`;
        });
        document.getElementById('tutorial-list').innerHTML = stepHtml;
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        document.getElementById('btnAnalyze').innerText = "Analisis Ulang ✨";
      }, 2000);
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').catch(err => console.log('SW Gagal'));
    }
  </script>

</body>
</html>
