<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#FAD0B9" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192x192-A.png" type="image/png" />
  <title>Moia - Makeup Assistant</title>
  
  <style>
    :root {
      --moia-cream: #FFF5ED;
      --moia-pink-soft: #FAD0B9;
      --moia-pink-darker: #F8B195;
      --moia-gold-text: #A3834B;
      --moia-text: #5D5D5D;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      background-color: var(--moia-cream);
      color: var(--moia-text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(to bottom, var(--moia-pink-soft), var(--moia-cream));
      text-align: center;
      padding: 3rem 1rem 2rem;
    }

    .header h1 {
      font-family: 'Georgia', serif;
      color: var(--moia-gold-text);
      margin: 0;
      font-size: 2.5rem;
      letter-spacing: 2px;
    }

    .main {
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
      flex: 1;
    }

    .card {
      background: white;
      border-radius: 25px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(248, 177, 149, 0.15);
      border: 1px solid var(--moia-pink-soft);
      margin-bottom: 20px;
      text-align: center;
    }

    /* Kamera */
    .camera-container {
      width: 100%;
      height: 300px;
      background: #000;
      border-radius: 20px;
      margin: 15px 0;
      position: relative;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .camera-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 240px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 50% 50% 45% 45%;
      box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.3);
      pointer-events: none;
    }

    /* Shade Recommendation */
    .shade-badge {
      display: inline-block;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      vertical-align: middle;
      margin-left: 10px;
    }

    /* Tutorial Steps */
    .step-list {
      text-align: left;
      margin-top: 15px;
    }

    .step-item {
      background: var(--moia-cream);
      margin-bottom: 10px;
      padding: 12px;
      border-radius: 12px;
      border-left: 5px solid var(--moia-pink-darker);
    }

    .step-item b {
      color: var(--moia-gold-text);
      display: block;
      margin-bottom: 4px;
    }

    button {
      background: linear-gradient(135deg, var(--moia-pink-soft), var(--moia-pink-darker));
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin: 10px 0;
    }

    .footer {
      text-align: center;
      padding: 20px;
      background-color: white;
      font-size: 0.8rem;
    }
  </style>
</head>

<body>

  <header class="header">
    <h1>Moia</h1>
    <p>Asisten Makeup Pintar Anda</p>
  </header>

  <main class="main">
    <section class="card">
      <h2>Scan Wajah</h2>
      <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="camera-overlay"></div>
      </div>
      <button onclick="runMoiaAnalysis()">Analisis & Berikan Tutorial</button>
    </section>

    <section id="tutorial-section" class="card" style="display: none;">
      <h3 id="face-type-title">Hasil Analisis</h3>
      
      <p>Rekomendasi Shade Anda: <span id="shade-name">...</span> <span id="shade-color" class="shade-badge"></span></p>

      <div class="step-list" id="tutorial-steps">
        </div>

      <div id="reasoning-box" style="background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px dashed var(--moia-gold-text); margin-top: 15px; text-align: left; font-size: 0.85rem;">
        <b>Mengapa teknik ini?</b><br>
        <span id="reasoning-text"></span>
      </div>
    </section>

    <div style="text-align: center;">
        <button onclick="alert('tombol testing hidup')">Ini tombol 1</button>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 Moia - Anwar Fauzi</p>
  </footer>

  <script>
    const video = document.getElementById('video');

    // Aktifkan Kamera Otomatis
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
      } catch (err) {
        alert("Kamera gagal diakses. Pastikan izin sudah diberikan.");
      }
    }
    startCamera();

    function runMoiaAnalysis() {
      alert("Moia sedang menganalisis struktur wajah dan shade kulit...");
      
      setTimeout(() => {
        // Tampilkan Section Tutorial
        document.getElementById('tutorial-section').style.display = 'block';
        
        // 1. Rekomendasi Shade & Type
        document.getElementById('face-type-title').innerText = "Tipe Wajah: Oval";
        document.getElementById('shade-name').innerText = "Warm Beige";
        document.getElementById('shade-color').style.backgroundColor = "#E8BEAC";
        
        // 2. Tutorial Steps
        const steps = [
          {title: "1. Foundation", desc: "Gunakan foundation tipis-tipis untuk meratakan warna kulit Warm Beige kamu."},
          {title: "2. Contouring", desc: "Terapkan sedikit di area rahang dan tulang pipi untuk mempertegas struktur Oval."},
          {title: "3. Eye Makeup", desc: "Gunakan warna earth tone agar sesuai dengan undertone warm kulitmu."}
        ];

        let stepsHTML = "";
        steps.forEach(s => {
          stepsHTML += `<div class="step-item"><b>${s.title}</b> ${s.desc}</div>`;
        });
        document.getElementById('tutorial-steps').innerHTML = stepsHTML;

        // 3. Alasan Rekomendasi
        document.getElementById('reasoning-text').innerText = "Karena wajahmu Oval, kami fokus pada teknik yang mempertahankan proporsi alami wajahmu sambil memberikan kilau sehat pada area yang menonjol.";

        // Scroll ke bawah
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      }, 1500);
    }

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').then(() => console.log('SW Registered'));
    }
  </script>

</body>
</html>
